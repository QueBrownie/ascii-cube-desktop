# kitty.conf — terminal emulator config
# Black background, green text. Clean and minimal.

# ── Font ───────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font Mono
bold_font        JetBrainsMono Nerd Font Mono Bold
italic_font      JetBrainsMono Nerd Font Mono Italic
font_size        13.0

# ── Colors ─────────────────────────────────────────────────────────────────────
background            #000000
foreground            #00ff41
cursor                #00ff41
cursor_text_color     #000000
selection_background  #003300
selection_foreground  #00ff41

# Black
color0  #000000
color8  #1a1a1a
# Red
color1  #cc0000
color9  #ff3333
# Green
color2  #00ff41
color10 #33ff66
# Yellow
color3  #ffcc00
color11 #ffdd44
# Blue
color4  #0066ff
color12 #3388ff
# Magenta
color5  #cc00cc
color13 #ff33ff
# Cyan
color6  #00cccc
color14 #33ffff
# White
color7  #cccccc
color15 #ffffff

# ── Window ─────────────────────────────────────────────────────────────────────
window_padding_width    10
hide_window_decorations yes
background_opacity      0.95

# ── Behaviour ──────────────────────────────────────────────────────────────────
confirm_os_window_close 0
enable_audio_bell       no
visual_bell_duration    0.0
mouse_hide_wait         2.0

# ── Scrollback ─────────────────────────────────────────────────────────────────
scrollback_lines 10000
