# picom.conf — compositor config
# Minimal. No shadows, no fading. Just transparency support for the cube.

backend = "glx";
vsync = true;

# ── Shadows ────────────────────────────────────────────────────────────────────
shadow = false;

# ── Fading ─────────────────────────────────────────────────────────────────────
fading = false;

# ── Opacity ────────────────────────────────────────────────────────────────────
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

# Allow the xwinwrap cube window to be transparent
opacity-rule = [
    "0:class_g = 'xwinwrap'"
];

# ── Blur ───────────────────────────────────────────────────────────────────────
blur-background = false;

# ── Rounded corners ────────────────────────────────────────────────────────────
corner-radius = 0;

# ── GLX options ────────────────────────────────────────────────────────────────
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;
